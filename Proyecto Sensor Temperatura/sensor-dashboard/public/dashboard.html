<div class="stat-card">
  <div class="label">Control de Dispositivo</div>
  <div class="value" id="ledStatusLabel" style="font-size: 1.2rem; margin-bottom: 10px; color: #8b949e;">LED APAGADO
    <button id="ledBtn" class="btn-logout" onclick="toggleLED()"
    style="width:100%; border-color: #58a6ff; color: #58a6ff;">
    ENCENDER LED
  </button>
  </div>
</div>

<script>
  // Añade esta función al final de tu script existente
  let currentLedState = 0;
  async function toggleLED() {
    currentLedState = currentLedState === 0 ? 1 : 0;
    try {
      const res = await fetch('/api/sensor/led', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${localStorage.getItem('token')}`
        },
        body: JSON.stringify({ status: currentLedState })
      });

      if (res.ok) {
        const btn = document.getElementById('ledBtn');
        const label = document.getElementById('ledStatusLabel');
        btn.textContent = currentLedState ? 'APAGAR LED' : 'ENCENDER LED';
        btn.style.borderColor = currentLedState ? '#ff6b6b' : '#58a6ff';
        btn.style.color = currentLedState ? '#ff6b6b' : '#58a6ff';
        label.textContent = currentLedState ? 'LED ENCENDIDO' : 'LED APAGADO';
        label.style.color = currentLedState ? '#3fb950' : '#8b949e';
      }
    } catch (err) {
      console.error("Error al controlar el LED");
    }
  }

  
</script>
