<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IoT Dashboard</title>
  <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
    nav { background: #161b22; border-bottom: 1px solid #30363d; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
    .nav-brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.1rem; }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-user { font-size: 0.9rem; color: #8b949e; }
    .nav-user strong { color: #58a6ff; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .btn-logout { padding: 7px 16px; background: transparent; border: 1px solid #30363d; border-radius: 8px; color: #8b949e; cursor: pointer; font-size: 0.88rem; transition: all 0.2s; }
    .btn-logout:hover { background: #21262d; color: #ff6b6b; border-color: #ff6b6b; }
    main { padding: 28px 24px; max-width: 1400px; margin: 0 auto; }
    h2 { font-size: 1rem; color: #8b949e; font-weight: 500; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px; transition: border-color 0.2s; }
    .stat-card:hover { border-color: #58a6ff; }
    .stat-card .label { font-size: 0.8rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .stat-card .value { font-size: 2rem; font-weight: 700; }
    .stat-card .sub { font-size: 0.8rem; color: #8b949e; margin-top: 4px; }
    .temp-color { color: #ff7b72; }
    .hum-color { color: #58a6ff; }
    .count-color { color: #3fb950; }
    .time-color { color: #d2a8ff; }
    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    @media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } }
    .chart-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px; }
    .chart-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .table-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; overflow: hidden; margin-bottom: 28px; }
    .table-header { padding: 16px 20px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
    .badge { background: #1f6feb33; border: 1px solid #1f6feb; color: #58a6ff; padding: 2px 10px; border-radius: 20px; font-size: 0.78rem; }
    table { width: 100%; border-collapse: collapse; }
    th { padding: 10px 20px; font-size: 0.78rem; font-weight: 600; color: #8b949e; text-transform: uppercase; background: #0d1117; text-align: left; }
    td { padding: 10px 20px; border-top: 1px solid #21262d; font-size: 0.9rem; }
    .loading { display: flex; align-items: center; justify-content: center; height: 200px; color: #8b949e; gap: 12px; }
    .spinner { width: 20px; height: 20px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .update-info { text-align: right; font-size: 0.78rem; color: #8b949e; margin-bottom: 12px; }
    .filter-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-btn { padding: 7px 16px; background: #21262d; border: 1px solid #30363d; border-radius: 8px; color: #8b949e; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
    .filter-btn.active { background: #1f6feb22; border-color: #58a6ff; color: #58a6ff; }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand"><span>🌡️</span> IoT Dashboard</div>
  <div class="nav-right">
    <div class="nav-user"><span class="status-dot"></span>Hola, <strong id="navUsername"></strong></div>
    <button class="btn-logout" onclick="logout()">⏻ Cerrar sesión</button>
  </div>
</nav>

<main>
  <div class="update-info">Última actualización: <span id="lastUpdated">—</span> · Actualización automática cada 30s</div>

  <h2>Lectura actual y Control</h2>
  <div class="stats-row">
    <div class="stat-card">
      <div class="label">🌡️ Temperatura</div>
      <div class="value temp-color" id="statTemp">—</div>
      <div class="sub">°Celsius</div>
    </div>
    <div class="stat-card">
      <div class="label">💧 Humedad</div>
      <div class="value hum-color" id="statHum">—</div>
      <div class="sub">% Relativa</div>
    </div>
    <div class="stat-card">
      <div class="label">Control de Dispositivo</div>
      <div class="value" id="ledStatusLabel" style="font-size: 1.2rem; margin-bottom: 10px; color: #8b949e;">LED APAGADO</div>
      <button id="ledBtn" class="btn-logout" onclick="toggleLED()" style="width:100%; border-color: #58a6ff; color: #58a6ff; background: rgba(88, 166, 255, 0.1);">
        ENCENDER LED
      </button>
    </div>
    <div class="stat-card">
      <div class="label">📊 Lecturas hoy</div>
      <div class="value count-color" id="statCount">—</div>
      <div class="sub">últimas 24h</div>
    </div>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="changeRange(this, 6)">Últimas 6h</button>
    <button class="filter-btn" onclick="changeRange(this, 24)">Últimas 24h</button>
  </div>

  <div class="chart-card" style="margin-bottom: 28px;">
    <div class="chart-title">📈 Historial Combinado</div>
    <div id="chartCombined"></div>
  </div>

  <div class="table-card">
    <div class="table-header"><span>📋 Últimas lecturas</span><span class="badge" id="tableCount">0 registros</span></div>
    <div id="tableBody"><div class="loading"><div class="spinner"></div> Cargando datos...</div></div>
  </div>
</main>

<script>
  const token = localStorage.getItem('token');
  const username = localStorage.getItem('username');
  if (!token) window.location.href = '/';
  document.getElementById('navUsername').textContent = username || 'Usuario';

  let currentHours = 6;
  let currentLedState = 0;

  async function apiFetch(url, options = {}) {
    const defaultOptions = { headers: { 'Authorization': `Bearer ${token}` } };
    const res = await fetch(url, { ...defaultOptions, ...options });
    if (res.status === 401) { logout(); return null; }
    return res.json();
  }

  // FUNCIÓN PARA EL BOTÓN LED
  async function toggleLED() {
    currentLedState = currentLedState === 0 ? 1 : 0;
    const res = await fetch('/api/sensor/led', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ status: currentLedState })
    });

    if (res.ok) {
      const btn = document.getElementById('ledBtn');
      const label = document.getElementById('ledStatusLabel');
      btn.textContent = currentLedState ? 'APAGAR LED' : 'ENCENDER LED';
      btn.style.borderColor = currentLedState ? '#ff6b6b' : '#58a6ff';
      btn.style.color = currentLedState ? '#ff6b6b' : '#58a6ff';
      label.textContent = currentLedState ? 'LED ENCENDIDO' : 'LED APAGADO';
      label.style.color = currentLedState ? '#3fb950' : '#8b949e';
    }
  }

  async function loadAll() {
    const [latest, history, stats] = await Promise.all([
      apiFetch('/api/sensor/latest'),
      apiFetch(`/api/sensor/history?hours=${currentHours}&limit=500`),
      apiFetch('/api/sensor/stats')
    ]);

    if (latest && latest.temperature != null) {
      document.getElementById('statTemp').textContent = latest.temperature.toFixed(1) + '°C';
      document.getElementById('statHum').textContent = latest.humidity.toFixed(1) + '%';
    }
    if (stats) document.getElementById('statCount').textContent = stats.count || 0;
    if (history) { renderCharts(history); renderTable(history); }
    document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();
  }

  function renderCharts(data) {
    const times = data.map(d => new Date(d.timestamp));
    const temps = data.map(d => d.temperature);
    const hums = data.map(d => d.humidity);
    const layout = { paper_bgcolor: 'transparent', plot_bgcolor: 'transparent', font: { color: '#8b949e' }, margin: { t: 20, b: 40, l: 40, r: 40 }, hovermode: 'x unified' };
    Plotly.newPlot('chartCombined', [
      { x: times, y: temps, name: 'Temp (°C)', line: { color: '#ff7b72' }, type: 'scatter' },
      { x: times, y: hums, name: 'Hum (%)', line: { color: '#58a6ff' }, type: 'scatter', yaxis: 'y2' }
    ], { ...layout, yaxis2: { overlaying: 'y', side: 'right' } }, { responsive: true });
  }

  function renderTable(data) {
    const reversed = [...data].reverse().slice(0, 10);
    document.getElementById('tableCount').textContent = `${data.length} registros`;
    document.getElementById('tableBody').innerHTML = `<table><thead><tr><th>Fecha</th><th>Temp</th><th>Hum</th></tr></thead><tbody>${reversed.map(d => `<tr><td>${new Date(d.timestamp).toLocaleString()}</td><td>${d.temperature.toFixed(1)}°C</td><td>${d.humidity.toFixed(1)}%</td></tr>`).join('')}</tbody></table>`;
  }

  function logout() { localStorage.removeItem('token'); localStorage.removeItem('username'); window.location.href = '/'; }
  function changeRange(btn, h) { currentHours = h; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); loadAll(); }

  loadAll();
  setInterval(loadAll, 30000);
</script>
</body>
</html>
